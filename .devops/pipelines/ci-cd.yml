# ci-cd.yml
# Full pipeline — lint, test, build, deploy

trigger:
  branches:
    include:
      - main          # runs when code is pushed to main branch

variables:
  acrName:         'acrhobbiesdev'
  acrLoginServer:  'acrhobbiesdev.azurecr.io'
  imageName:       'hobbies-tracker'
  imageTag:        '$(Build.BuildId)'      # unique tag per build
  resourceGroup:   'rg-hobbies-dev'

stages:

# ─────────────────────────────────────
# STAGE 1 — Lint and Test
# ─────────────────────────────────────
- stage: Test
  displayName: 'Lint and Test'
  jobs:
  - job: RunTests
    pool:
      vmImage: 'ubuntu-latest'
    steps:

    - task: UsePythonVersion@0
      inputs:
        versionSpec: '3.11'

    - script: |
        pip install flake8 pytest
        pip install -r app/requirements.txt
      displayName: 'Install dependencies'

    - script: |
        flake8 app/src --max-line-length=120
      displayName: 'Lint — flake8'

    - script: |
        pytest app/tests/ -v
      displayName: 'Unit tests — pytest'

# ─────────────────────────────────────
# STAGE 2 — Build and Push Docker image
# ─────────────────────────────────────
- stage: Build
  displayName: 'Build and Push to ACR'
  dependsOn: Test          # only runs if Test stage passes
  jobs:
  - job: BuildImage
    pool:
      vmImage: 'ubuntu-latest'
    steps:

    - task: AzureCLI@2
      displayName: 'Build and push Docker image to ACR'
      inputs:
        azureSubscription: 'azure-connection'
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          az acr login --name $(acrName)
          docker build -t $(acrLoginServer)/$(imageName):$(imageTag) ./app
          docker push $(acrLoginServer)/$(imageName):$(imageTag)

# ─────────────────────────────────────
# STAGE 3 — Terraform
# ─────────────────────────────────────
- stage: Infrastructure
  displayName: 'Terraform Plan and Apply'
  dependsOn: Build
  jobs:
  - job: TerraformApply
    pool:
      vmImage: 'ubuntu-latest'
    steps:

    - task: TerraformInstaller@1
      inputs:
        terraformVersion: 'latest'

    - task: AzureCLI@2
      displayName: 'Terraform Init'
      inputs:
        azureSubscription: 'azure-connection'
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          cd infra/environments/dev
          terraform init

    - task: AzureCLI@2
      displayName: 'Terraform Plan'
      inputs:
        azureSubscription: 'azure-connection'
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          cd infra/environments/dev
          terraform plan -out=tfplan

    - task: AzureCLI@2
      displayName: 'Terraform Apply'
      inputs:
        azureSubscription: 'azure-connection'
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          cd infra/environments/dev
          terraform apply -auto-approve tfplan

# ─────────────────────────────────────
# STAGE 4 — Deploy to Azure App Service
# ─────────────────────────────────────
- stage: Deploy
  displayName: 'Deploy to Azure App Service'
  dependsOn: Infrastructure
  jobs:
  - job: DeployApp
    pool:
      vmImage: 'ubuntu-latest'
    steps:

    - task: AzureWebAppContainer@1
      displayName: 'Deploy container to App Service'
      inputs:
        azureSubscription: 'azure-connection'
        appName:           'app-hobbies-dev'
        containers:        '$(acrLoginServer)/$(imageName):$(imageTag)'