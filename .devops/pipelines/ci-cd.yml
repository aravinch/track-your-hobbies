# ci-cd.yml
trigger:
  branches:
    include:
      - main

variables:
  acrName:        'acrhobbiesdev'
  acrLoginServer: 'acrhobbiesdev.azurecr.io'
  imageName:      'hobbies-tracker'
  imageTag:       '$(Build.BuildId)'
  resourceGroup:  'rg-hobbies-dev'

stages:

# ─────────────────────────────────────
# STAGE 1 — Lint and Test
# ─────────────────────────────────────
- stage: Test
  displayName: 'Lint and Test'
  jobs:
  - job: RunTests
    pool:
      vmImage: 'ubuntu-latest'
    steps:

    - task: UsePythonVersion@0
      inputs:
        versionSpec: '3.11'

    - script: |
        pip install flake8 pytest
        pip install -r app/requirements.txt
      displayName: 'Install dependencies'

    - script: |
        flake8 app/src --max-line-length=120
      displayName: 'Lint — flake8'

    - script: |
        cd app
        pytest tests/ -v
      displayName: 'Unit tests — pytest'

# ─────────────────────────────────────
# STAGE 2 — Build and Push Docker image
# ─────────────────────────────────────
- stage: Build
  displayName: 'Build and Push to ACR'
  dependsOn: Test
  jobs:
  - job: BuildImage
    pool:
      vmImage: 'ubuntu-latest'
    steps:

    - task: AzureCLI@2
      displayName: 'Build and push Docker image to ACR'
      inputs:
        azureSubscription: 'azure-connection'
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          az acr login --name $(acrName)
          docker build -t $(acrLoginServer)/$(imageName):$(imageTag) ./app
          docker push $(acrLoginServer)/$(imageName):$(imageTag)

# ─────────────────────────────────────
# STAGE 3 — Terraform
# ─────────────────────────────────────
- stage: Infrastructure
  displayName: 'Terraform Plan and Apply'
  dependsOn: Build
  jobs:
  - job: TerraformApply
    pool:
      vmImage: 'ubuntu-latest'
    steps:

    - task: TerraformInstaller@1
      inputs:
        terraformVersion: 'latest'

    - task: AzureCLI@2
      displayName: 'Terraform Init'
      inputs:
        azureSubscription: 'azure-connection'
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          cd infra/environments/dev
          terraform init
      env:
        TF_VAR_subscription_id: $(TF_VAR_subscription_id)
        TF_VAR_environment:     $(TF_VAR_environment)
        TF_VAR_location:        $(TF_VAR_location)

    - task: AzureCLI@2
      displayName: 'Terraform Plan'
      inputs:
        azureSubscription: 'azure-connection'
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          cd infra/environments/dev
          terraform plan -out=tfplan
      env:
        TF_VAR_subscription_id:    $(TF_VAR_subscription_id)
        TF_VAR_environment:        $(TF_VAR_environment)
        TF_VAR_location:           $(TF_VAR_location)
        # ✅ ADD TO PLAN STEP TOO
        TF_VAR_sql_admin_username: $(SQL_ADMIN_USERNAME)
        TF_VAR_sql_admin_password: $(SQL_ADMIN_PASSWORD)
        TF_VAR_sql_location:       $(sql_location)

    - task: AzureCLI@2
      displayName: 'Terraform Apply'
      inputs:
        azureSubscription: 'azure-connection'
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          cd infra/environments/dev
          terraform apply -auto-approve tfplan
      env:
        TF_VAR_subscription_id:    $(TF_VAR_subscription_id)
        TF_VAR_environment:        $(TF_VAR_environment)
        TF_VAR_location:           $(TF_VAR_location)
        # ✅ FIXED — Azure DevOps syntax
        TF_VAR_sql_admin_username: $(SQL_ADMIN_USERNAME)
        TF_VAR_sql_admin_password: $(SQL_ADMIN_PASSWORD)
        TF_VAR_sql_location:       $(sql_location)
# ─────────────────────────────────────
# STAGE 4 — Deploy to Azure App Service
# ─────────────────────────────────────
- stage: Deploy
  displayName: 'Deploy to Azure App Service'
  dependsOn: Infrastructure
  jobs:
  - job: DeployApp
    pool:
      vmImage: 'ubuntu-latest'
    steps:

    - task: AzureWebAppContainer@1
      displayName: 'Deploy container to App Service'
      inputs:
        azureSubscription: 'azure-connection'
        appName:           'app-hobbies-dev'
        containers:        '$(acrLoginServer)/$(imageName):$(imageTag)'